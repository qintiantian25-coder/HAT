name: train_HAT_blind_SRx4
model_type: HATModel
scale: 1
num_gpu: 2                       # 显式指定使用2块GPU
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: BlindDataset
    type: PairedImageDataset
    dataroot_gt: /home/student_server/Qtt/NAFNet/data/train_sharp
    dataroot_lq: /home/student_server/Qtt/NAFNet/data/train_blur
    io_backend:
      type: disk

    gt_size: 96
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 2        # 降低数据加载线程数
    batch_size_per_gpu: 1        # 降低单卡batch size以节省显存
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: BlindVal
    type: PairedImageDataset
    dataroot_gt: /home/student_server/Qtt/NAFNet/data/val_sharp
    dataroot_lq: /home/student_server/Qtt/NAFNet/data/val_blur
    io_backend:
      type: disk

# network structures (same as default HAT SRx4)
network_g:
  type: HAT
  upscale: 1
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: ''          # 改为空字符串，不使用上采样
  resi_connection: '1conv'
  use_checkpoint: false

# path
path:
  pretrain_network_g: ~
  param_key_g: 'params_ema'
  strict_load_g: false
  resume_state: ~

# training settings
train:
  gradient_accumulation_steps: 2   # 添加这一行
  use_amp: false                   # 【可选】如果方案二生效，可以保留这行
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [125000, 200000, 225000, 240000]
    gamma: 0.5

  total_iter: 50000
  warmup_iter: -1

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: 20000
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# 分布式训练配置（核心优化点）
dist_params:
  backend: nccl
  port: 29500
  find_unused_parameters: false