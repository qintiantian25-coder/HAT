name: train_HAT_blind
model_type: HATModel
scale: 1
num_gpu: 1                         # 改为单卡
manual_seed: 0

datasets:
  train:
    name: BlindDataset
    type: PairedImageDataset
    dataroot_gt: /home/student_server/Qtt/NAFNet/data/train_sharp
    dataroot_lq: /home/student_server/Qtt/NAFNet/data/train_blur
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4          # 单卡显存更充裕，可尝试从1增加到2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: BlindVal
    type: PairedImageDataset
    dataroot_gt: /home/student_server/Qtt/NAFNet/data/val_sharp
    dataroot_lq: /home/student_server/Qtt/NAFNet/data/val_blur
    io_backend:
      type: disk

network_g:
  type: HAT
  upscale: 1
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: ''
  resi_connection: '1conv'
  use_checkpoint: true             # 开启梯度检查点，单卡下帮助更大

path:
  pretrain_network_g: ~
  param_key_g: params_ema
  strict_load_g: false
  resume_state: ~
  # set experiments root so best_model.pt is saved to the requested location
  experiments_root: /home/student_server/Qtt/HAT/experiments

train:
  gradient_accumulation_steps: 1   # 既然 batch_size=2，可以不再累积，保持等效总batch=2
  use_amp: true
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: 0.0001
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [125000, 200000, 225000, 240000]
    gamma: 0.5
  total_iter: 50000
  warmup_iter: -1
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: 5000
  save_img: false
  pbar: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher

logger:
  print_freq: 100
  # disable periodic checkpointing to keep only the best model saved
  save_checkpoint_freq: 0
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# 单卡不需要 dist_params，可以删除或留空